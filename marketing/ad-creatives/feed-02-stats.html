<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>인테리어코치 피드 광고 02 - 통계</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #0A0A0A;
    font-family: 'Pretendard Variable', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    overflow: hidden;
  }

  .hook {
    font-size: 56px;
    font-weight: 800;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 56px;
  }

  .hook .green { color: #00C471; }
  .hook .red { color: #EF4444; }

  .stats-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    width: 100%;
    margin-bottom: 56px;
  }

  .stat-card {
    flex: 1 1 calc(50% - 12px);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 36px;
    text-align: center;
  }

  .stat-value {
    font-size: 52px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .stat-value.green { color: #00C471; }
  .stat-value.red { color: #EF4444; }
  .stat-value.white { color: #ffffff; }

  .stat-label {
    font-size: 24px;
    color: rgba(255,255,255,0.5);
    line-height: 1.4;
  }

  .bottom-section {
    width: 100%;
    background: rgba(0, 196, 113, 0.06);
    border: 1px solid rgba(0, 196, 113, 0.2);
    border-radius: 24px;
    padding: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .bottom-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .bottom-icon {
    width: 56px;
    height: 56px;
    background: #00C471;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 800;
    color: #000;
  }

  .bottom-text {
    font-size: 28px;
    font-weight: 600;
  }

  .bottom-sub {
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
  }

  .bottom-cta {
    background: #00C471;
    color: #000;
    font-size: 28px;
    font-weight: 700;
    padding: 16px 36px;
    border-radius: 14px;
  }
</style>
</head>
<body>

  <div class="hook">
    인테리어 업체의<br>
    <span class="red">90%</span>가 아직<br>
    <span class="green">엑셀</span>로 견적을 씁니다
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value white">41조</div>
      <div class="stat-label">국내 인테리어<br>시장 규모</div>
    </div>
    <div class="stat-card">
      <div class="stat-value red">90%+</div>
      <div class="stat-label">5인 미만<br>영세 사업체</div>
    </div>
    <div class="stat-card">
      <div class="stat-value red">120만+</div>
      <div class="stat-label">업체 월 평균<br>분산 운영비</div>
    </div>
    <div class="stat-card">
      <div class="stat-value green">29.9만</div>
      <div class="stat-label">인테리어코치 Pro<br>올인원 월 비용</div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="bottom-left">
      <div class="bottom-icon">IC</div>
      <div>
        <div class="bottom-text">인테리어코치</div>
        <div class="bottom-sub">모든 업무, 하나로.</div>
      </div>
    </div>
    <div class="bottom-cta">무료 시작 →</div>
  </div>

</body>
</html>
