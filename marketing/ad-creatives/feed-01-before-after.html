<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>인테리어코치 피드 광고 01 - 비포/애프터</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #0A0A0A;
    font-family: 'Pretendard Variable', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    overflow: hidden;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 48px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: #00C471;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    color: #000;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 700;
  }

  .badge {
    background: rgba(0, 196, 113, 0.15);
    border: 1px solid rgba(0, 196, 113, 0.3);
    color: #00C471;
    font-size: 22px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 100px;
  }

  .comparison {
    display: flex;
    gap: 32px;
    width: 100%;
    margin-bottom: 48px;
  }

  .side {
    flex: 1;
    border-radius: 24px;
    padding: 36px;
  }

  .side-before {
    background: rgba(239, 68, 68, 0.06);
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .side-after {
    background: rgba(0, 196, 113, 0.06);
    border: 1px solid rgba(0, 196, 113, 0.2);
  }

  .side-label {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 28px;
    text-align: center;
  }

  .side-before .side-label { color: #EF4444; }
  .side-after .side-label { color: #00C471; }

  .side-items {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .side-item {
    display: flex;
    justify-content: space-between;
    font-size: 24px;
  }

  .side-item .name {
    color: rgba(255,255,255,0.6);
  }

  .side-before .side-item .value {
    color: #EF4444;
    font-weight: 600;
  }

  .side-after .side-item .value {
    color: #00C471;
    font-weight: 600;
  }

  .side-total {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: space-between;
    font-size: 28px;
    font-weight: 700;
  }

  .side-before .side-total .value { color: #EF4444; }
  .side-after .side-total .value { color: #00C471; }

  .saving {
    background: rgba(0, 196, 113, 0.1);
    border: 2px solid rgba(0, 196, 113, 0.3);
    border-radius: 20px;
    padding: 28px 48px;
    text-align: center;
    margin-bottom: 40px;
  }

  .saving-label {
    font-size: 24px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }

  .saving-value {
    font-size: 48px;
    font-weight: 800;
    color: #00C471;
  }

  .cta {
    background: #00C471;
    color: #000;
    font-size: 32px;
    font-weight: 700;
    padding: 20px 60px;
    border-radius: 16px;
  }
</style>
</head>
<body>

  <div class="top-bar">
    <div class="logo">
      <div class="logo-icon">IC</div>
      <div class="logo-text">인테리어코치</div>
    </div>
    <div class="badge">비용 비교</div>
  </div>

  <div class="comparison">
    <div class="side side-before">
      <div class="side-label">지금 (따로따로)</div>
      <div class="side-items">
        <div class="side-item">
          <span class="name">블로그 대행</span>
          <span class="value">70만</span>
        </div>
        <div class="side-item">
          <span class="name">세무사</span>
          <span class="value">35만</span>
        </div>
        <div class="side-item">
          <span class="name">현장관리앱</span>
          <span class="value">15만</span>
        </div>
        <div class="side-item">
          <span class="name">SNS 대행</span>
          <span class="value">40만</span>
        </div>
      </div>
      <div class="side-total">
        <span>합계</span>
        <span class="value">160만/월</span>
      </div>
    </div>

    <div class="side side-after">
      <div class="side-label">인테리어코치 Pro</div>
      <div class="side-items">
        <div class="side-item">
          <span class="name">현장관리</span>
          <span class="value">포함</span>
        </div>
        <div class="side-item">
          <span class="name">AI 세무</span>
          <span class="value">포함</span>
        </div>
        <div class="side-item">
          <span class="name">마케팅 자동화</span>
          <span class="value">포함</span>
        </div>
        <div class="side-item">
          <span class="name">견적코치 AI</span>
          <span class="value">포함</span>
        </div>
      </div>
      <div class="side-total">
        <span>합계</span>
        <span class="value">29.9만/월</span>
      </div>
    </div>
  </div>

  <div class="saving">
    <div class="saving-label">연간 절감액</div>
    <div class="saving-value">1,561만원</div>
  </div>

  <div class="cta">14일 무료 체험 →</div>

</body>
</html>
