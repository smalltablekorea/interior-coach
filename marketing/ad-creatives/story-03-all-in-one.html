<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>인테리어코치 스토리 광고 03 - 올인원</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: #0A0A0A;
    font-family: 'Pretendard Variable', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 60px;
    overflow: hidden;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 60px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    background: #00C471;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    color: #000;
  }

  .logo-text {
    font-size: 36px;
    font-weight: 700;
  }

  .hook {
    font-size: 68px;
    font-weight: 800;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 20px;
  }

  .hook .green { color: #00C471; }

  .sub {
    font-size: 30px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    margin-bottom: 72px;
  }

  .features {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 72px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 32px 36px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
  }

  .feature-icon {
    width: 72px;
    height: 72px;
    min-width: 72px;
    background: rgba(0, 196, 113, 0.12);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }

  .feature-text {
    flex: 1;
  }

  .feature-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .feature-desc {
    font-size: 24px;
    color: rgba(255,255,255,0.45);
  }

  .feature-old-price {
    font-size: 26px;
    color: #EF4444;
    text-decoration: line-through;
    text-align: right;
    min-width: 140px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 40px;
  }

  .price-section {
    text-align: center;
    margin-bottom: 60px;
  }

  .price-label {
    font-size: 28px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
  }

  .price-value {
    font-size: 80px;
    font-weight: 800;
    color: #00C471;
  }

  .price-unit {
    font-size: 32px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
  }

  .price-note {
    font-size: 24px;
    color: rgba(255,255,255,0.35);
    margin-top: 8px;
  }

  .cta {
    background: #00C471;
    color: #000000;
    font-size: 40px;
    font-weight: 700;
    padding: 28px 80px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .sub-cta {
    font-size: 28px;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

  <div class="logo">
    <div class="logo-icon">IC</div>
    <div class="logo-text">인테리어코치</div>
  </div>

  <div class="hook">
    인테리어 업체의<br>
    <span class="green">모든 업무, 하나로.</span>
  </div>

  <div class="sub">4가지 서비스를 하나로 통합</div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">📋</div>
      <div class="feature-text">
        <div class="feature-title">현장관리</div>
        <div class="feature-desc">공정 · 사진 · 일정 · 정산</div>
      </div>
      <div class="feature-old-price">월 15만</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🤖</div>
      <div class="feature-text">
        <div class="feature-title">견적코치 AI</div>
        <div class="feature-desc">12공종 분석 · 고객 자동 연결</div>
      </div>
      <div class="feature-old-price">신규</div>
    </div>
    <div class="feature">
      <div class="feature-icon">📢</div>
      <div class="feature-text">
        <div class="feature-title">마케팅 자동화</div>
        <div class="feature-desc">블로그 · 인스타 · 스레드 · 유튜브</div>
      </div>
      <div class="feature-old-price">월 100만+</div>
    </div>
    <div class="feature">
      <div class="feature-icon">📊</div>
      <div class="feature-text">
        <div class="feature-title">세무 / 회계</div>
        <div class="feature-desc">OCR · 부가세 · AI 세무 상담</div>
      </div>
      <div class="feature-old-price">월 35만</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="price-section">
    <div class="price-label">이 전부가</div>
    <div class="price-value">29.9만<span class="price-unit">/월</span></div>
    <div class="price-note">연간 결제 시 월 23.9만원</div>
  </div>

  <div class="cta">14일 무료 체험</div>
  <div class="sub-cta">카드 등록 후 언제든 해지</div>

</body>
</html>
