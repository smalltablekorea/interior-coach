<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>인테리어코치 스토리 광고 01 - 비용 절감</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: #0A0A0A;
    font-family: 'Pretendard Variable', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 60px;
    overflow: hidden;
  }

  .badge {
    background: rgba(0, 196, 113, 0.15);
    border: 1px solid rgba(0, 196, 113, 0.3);
    color: #00C471;
    font-size: 28px;
    font-weight: 600;
    padding: 12px 32px;
    border-radius: 100px;
    margin-bottom: 60px;
  }

  .hook {
    font-size: 72px;
    font-weight: 800;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 80px;
  }

  .hook .highlight {
    color: #00C471;
  }

  .cost-list {
    width: 100%;
    margin-bottom: 60px;
  }

  .cost-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .cost-item .label {
    font-size: 36px;
    color: rgba(255,255,255,0.7);
  }

  .cost-item .price {
    font-size: 36px;
    font-weight: 700;
    color: #EF4444;
    text-decoration: line-through;
    text-decoration-color: rgba(239,68,68,0.5);
  }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 36px 40px;
    background: rgba(239, 68, 68, 0.08);
    border-radius: 24px;
    margin-bottom: 40px;
  }

  .total-row .label {
    font-size: 36px;
    font-weight: 600;
  }

  .total-row .price {
    font-size: 44px;
    font-weight: 800;
    color: #EF4444;
  }

  .arrow-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
  }

  .arrow {
    font-size: 60px;
    color: #00C471;
    margin-bottom: 16px;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 40px;
    background: rgba(0, 196, 113, 0.1);
    border: 2px solid rgba(0, 196, 113, 0.3);
    border-radius: 24px;
    margin-bottom: 80px;
    width: 100%;
  }

  .result-row .label {
    font-size: 36px;
    font-weight: 600;
  }

  .result-row .brand {
    font-size: 28px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }

  .result-row .price {
    font-size: 52px;
    font-weight: 800;
    color: #00C471;
  }

  .cta {
    background: #00C471;
    color: #000000;
    font-size: 40px;
    font-weight: 700;
    padding: 28px 80px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .sub-cta {
    font-size: 28px;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

  <div class="badge">인테리어 업체 사장님께</div>

  <div class="hook">
    매달 이만큼<br>
    <span class="highlight">따로따로</span> 쓰고 계시죠?
  </div>

  <div class="cost-list">
    <div class="cost-item">
      <span class="label">블로그 대행</span>
      <span class="price">월 70만원</span>
    </div>
    <div class="cost-item">
      <span class="label">세무사 기장료</span>
      <span class="price">월 35만원</span>
    </div>
    <div class="cost-item">
      <span class="label">현장관리 앱</span>
      <span class="price">월 15만원</span>
    </div>
  </div>

  <div class="total-row">
    <span class="label">매달 합계</span>
    <span class="price">120만원+</span>
  </div>

  <div class="arrow-section">
    <div class="arrow">↓</div>
  </div>

  <div class="result-row">
    <div>
      <div class="label">전부 하나로</div>
      <div class="brand">인테리어코치 Pro</div>
    </div>
    <div class="price">월 29.9만</div>
  </div>

  <div class="cta">무료로 시작하기</div>
  <div class="sub-cta">14일 무료 체험 · 카드 등록 후 언제든 해지</div>

</body>
</html>
