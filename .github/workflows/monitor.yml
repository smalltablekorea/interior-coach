name: Deploy Monitor & Rollback

on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}
    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Health check
        id: check
        run: |
          SITE_URL="${{ secrets.PRODUCTION_URL || 'https://interior-coach.vercel.app' }}"
          MAX_RETRIES=3
          HEALTHY=false
          
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SITE_URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              HEALTHY=true
              break
            fi
            sleep 10
          done
          
          echo "healthy=$HEALTHY" >> "$GITHUB_OUTPUT"
          if [ "$HEALTHY" = "false" ]; then
            echo "🚨 Health check FAILED after $MAX_RETRIES attempts"
          fi

      - name: Notify Telegram on success
        if: steps.check.outputs.healthy == 'true'
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="HTML" \
              -d text="✅ <b>interior-coach 배포 완료</b>%0A%0ACommit: <code>${{ github.event.workflow_run.head_sha }}</code>%0ABranch: ${{ github.event.workflow_run.head_branch }}%0AStatus: 정상 운영 중"
          fi

  alert-failure:
    name: Alert on Deploy Failure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Notify Telegram on deploy failure
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="HTML" \
              -d text="🚨 <b>interior-coach 배포 실패!</b>%0A%0ACommit: <code>${{ github.event.workflow_run.head_sha }}</code>%0ABranch: ${{ github.event.workflow_run.head_branch }}%0A%0A👉 <a href='${{ github.event.workflow_run.html_url }}'>GitHub Actions 로그 확인</a>"
          fi

  rollback:
    name: Auto Rollback
    runs-on: ubuntu-latest
    needs: health-check
    if: needs.health-check.outputs.healthy == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get previous commit
        id: prev
        run: |
          PREV_SHA=$(git rev-parse HEAD~1)
          echo "sha=$PREV_SHA" >> "$GITHUB_OUTPUT"
          echo "Rolling back to $PREV_SHA"

      - name: Rollback via Vercel (redeploy previous)
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          npm i -g vercel@latest
          vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null || echo "Vercel rollback attempted"

      - name: Notify Telegram about rollback
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="HTML" \
              -d text="⚠️ <b>interior-coach 자동 롤백 실행!</b>%0A%0A실패 커밋: <code>${{ github.event.workflow_run.head_sha }}</code>%0A롤백 대상: <code>${{ steps.prev.outputs.sha }}</code>%0A%0AVercel 이전 배포로 복원됨"
          fi

  ci-failure-alert:
    name: Alert on CI Failure  
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Notify Telegram on CI failure
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="HTML" \
              -d text="❌ <b>interior-coach CI 실패</b>%0A%0AWorkflow: ${{ github.event.workflow_run.name }}%0ACommit: <code>${{ github.event.workflow_run.head_sha }}</code>%0A%0A👉 <a href='${{ github.event.workflow_run.html_url }}'>로그 확인</a>"
          fi
