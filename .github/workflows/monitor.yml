name: Deploy Monitor & Rollback

on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}
    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Health check
        id: check
        run: |
          SITE_URL="${{ secrets.PRODUCTION_URL || 'https://interiorcoach.kr' }}"
          MAX_RETRIES=3
          HEALTHY=false
          
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SITE_URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              HEALTHY=true
              break
            fi
            sleep 10
          done
          
          echo "healthy=$HEALTHY" >> "$GITHUB_OUTPUT"
          if [ "$HEALTHY" = "false" ]; then
            echo "🚨 Health check FAILED after $MAX_RETRIES attempts"
          fi

      - name: Notify Telegram on success
        if: steps.check.outputs.healthy == 'true'
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=✅ 인테리어코치 배포 후 헬스체크 통과" \
              -d "parse_mode=Markdown" > /dev/null
          fi

  rollback:
    name: Auto-Rollback
    needs: health-check
    runs-on: ubuntu-latest
    if: ${{ needs.health-check.outputs.healthy == 'false' }}
    steps:
      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Rollback to previous deployment
        run: |
          echo "🔄 Rolling back to previous deployment..."
          # List recent deployments, get the second one (previous)
          PREV_URL=$(vercel ls --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null | head -5 | tail -1 | awk '{print $2}')
          if [ -n "$PREV_URL" ]; then
            vercel promote "$PREV_URL" --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null || true
            echo "✅ Rolled back to: $PREV_URL"
          else
            echo "⚠️ Could not find previous deployment to rollback"
          fi

      - name: Notify Telegram on rollback
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            MSG="🚨 *인테리어코치 자동 롤백 실행!*%0A%0A배포 후 헬스체크 실패로 이전 버전으로 롤백되었습니다.%0A%0A확인: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}&parse_mode=Markdown" > /dev/null
          fi

  notify-deploy-failure:
    name: Notify Deploy Failure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            MSG="🚨 *인테리어코치 배포 파이프라인 실패!*%0A%0A확인: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}&parse_mode=Markdown" > /dev/null
          fi
